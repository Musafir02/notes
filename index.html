<!doctype html>
<html lang="en">

<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-03022V9LRJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-03022V9LRJ');
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5" />
  <title>Sem Notes — Ibrahim Shaikh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #ffffff;
      --secondary: #888888;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
      -webkit-overflow-scrolling: touch;
    }

    #animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.4;
      pointer-events: none;
      will-change: transform;
      transform: translateZ(0);
    }

    .grain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(255, 255, 255, 0.01) 2px,
          rgba(255, 255, 255, 0.01) 4px);
      z-index: 1;
      pointer-events: none;
      opacity: 0.3;
      will-change: transform;
      transform: translateZ(0);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 32px;
      position: relative;
      z-index: 2;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 32px 0;
      animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 20px;
    }

    .nav-logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05));
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 20px;
    }

    .hero {
      padding: 80px 0 60px;
      text-align: center;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 24px;
      animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background: #fff;
      border-radius: 50%;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 96px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #fff 0%, rgba(255, 255, 255, 0.5) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.03em;
    }

    .gradient-text {
      background: linear-gradient(135deg, #ffffff, #888888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite;
    }

    .subtitle {
      font-size: 20px;
      color: rgba(255, 255, 255, 0.5);
      max-width: 600px;
      margin: 0 auto 64px;
      line-height: 1.6;
    }

    .section-header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 40px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .section-subtitle {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.5);
    }

    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding-bottom: 20px;
      max-width: 700px;
      margin: 0 auto;
      animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
    }

    .contribute-section {
      display: flex;
      justify-content: center;
      padding-bottom: 16px;
      animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
    }

    .contribute-text {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 500;
    }

    .subject-card {
      position: relative;
      padding: 40px 24px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      text-decoration: none;
      color: #fff;
      transition: all 0.3s ease;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      cursor: pointer;
      min-height: 200px;
    }

    .subject-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at center, rgba(59, 130, 246, 0.05), transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    @media (hover: hover) and (pointer: fine) {
      .subject-card {
        will-change: transform;
      }

      .subject-card:hover::before {
        opacity: 1;
      }

      .subject-card:hover {
        transform: translateY(-8px);
        border-color: rgba(59, 130, 246, 0.4);
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(59, 130, 246, 0.2);
      }

      .subject-card:hover .subject-icon {
        transform: scale(1.1) rotate(-5deg);
        box-shadow: 0 8px 24px rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.4);
      }
    }

    .subject-card:active {
      transform: translateY(-2px);
      transition: all 0.1s ease;
    }

    .subject-icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: grid;
      place-items: center;
      font-size: 36px;
      font-weight: 700;
      transition: all 0.3s ease;
      font-family: 'Space Grotesk', sans-serif;
    }

    .subject-content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .subject-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .subject-count {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 500;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
      font-size: 12px;
      z-index: 10;
      background: rgba(10, 10, 10, 0.8);
      backdrop-filter: blur(10px);
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes gradientShift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 768px) {
      .grain {
        display: none;
      }

      .container {
        padding: 0 20px;
      }

      nav {
        padding: 24px 0;
      }

      h1 {
        font-size: 52px;
      }

      .hero {
        padding: 40px 0 40px;
      }

      .subjects-grid {
        gap: 16px;
        max-width: 100%;
      }

      .subject-card {
        min-height: 170px;
        padding: 28px 20px;
      }

      .subject-icon {
        width: 60px;
        height: 60px;
        font-size: 28px;
      }

      .subject-title {
        font-size: 17px;
      }

      .section-title {
        font-size: 24px;
      }

      .subtitle {
        font-size: 17px;
        margin-bottom: 48px;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 42px;
      }

      .subject-icon {
        width: 52px;
        height: 52px;
        font-size: 24px;
      }

      .subject-title {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <canvas id="animated-bg"></canvas>
  <div class="grain"></div>

  <div class="container">
    <section class="hero">
      <div class="badge">
        <div class="badge-dot"></div>
        Notes Hub
      </div>
      <h1>Your <span class="gradient-text">Ultimate</span><br>Study Resource</h1>
      <p class="subtitle">Pick your semester to access all subject notes, PDFs, and resources.</p>
    </section>

    <section id="subjects">
      <div class="subjects-grid">
        <a href="sem3/" class="subject-card">
          <div class="subject-icon">3</div>
          <div class="subject-content">
            <div class="subject-title">Semester 3</div>
            <div class="subject-count">6 Subjects</div>
          </div>
        </a>
        <a href="sem4/" class="subject-card">
          <div class="subject-icon">4</div>
          <div class="subject-content">
            <div class="subject-title">Semester 4</div>
            <div class="subject-count">5 Subjects</div>
          </div>
        </a>
      </div>

      <div class="contribute-section">
        <div class="contribute-text">Made by Ibrahim Shaikh</div>
      </div>
    </section>

    <footer>Share your notes to contribute.</footer>
  </div>

  <script>
    const canvas = document.getElementById('animated-bg');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const gradient = ctx.createRadialGradient(
      canvas.width / 2, canvas.height / 2, 0,
      canvas.width / 2, canvas.height / 2, canvas.width / 2
    );
    gradient.addColorStop(0, 'rgba(50, 50, 50, 0.3)');
    gradient.addColorStop(0.5, 'rgba(30, 30, 30, 0.2)');
    gradient.addColorStop(1, 'rgba(10, 10, 10, 0.1)');

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    });

    document.querySelectorAll('.subject-card').forEach(card => {
      const isMobile = window.matchMedia('(max-width: 768px)').matches;
      if (!isMobile) {
        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect();
          const x = ((e.clientX - rect.left) / rect.width) * 100;
          const y = ((e.clientY - rect.top) / rect.height) * 100;
          card.style.setProperty('--mouse-x', `${x}%`);
          card.style.setProperty('--mouse-y', `${y}%`);
        });
        card.addEventListener('mouseleave', () => {
          card.style.setProperty('--mouse-x', '50%');
          card.style.setProperty('--mouse-y', '50%');
        });
      }
    });
  </script>
</body>

</html>
