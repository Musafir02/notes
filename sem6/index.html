<!doctype html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-03022V9LRJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-03022V9LRJ');
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5" />
  <title>Semester 6 - Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0c0e14;
      --surface:#141620;
      --surface-border:#1e2030;
      --surface-hover:#1a1d2e;
      --text-primary:#e2e4ed;
      --text-secondary:#8a8fa8;
      --text-muted:#5a5f78;
      --accent-purple:#a78bfa;
      --accent-green:#34d399;
      --accent-blue:#60a5fa;
      --accent-amber:#fbbf24;
      --radius:16px;
      --radius-sm:10px;
    }
    body{
      font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;
      background:var(--bg);
      color:var(--text-primary);
      min-height:100vh;
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
      line-height:1.4;
    }
    .bg-glow{
      position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%,rgba(99,102,241,.08),transparent),
        radial-gradient(ellipse 40% 30% at 20% 20%,rgba(139,92,246,.06),transparent),
        radial-gradient(ellipse 40% 30% at 80% 20%,rgba(52,211,153,.04),transparent);
    }
    .container{max-width:1100px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
    .container::after{
      content:'';
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
      background-size:36px 36px;
      mask-image:radial-gradient(circle at center,rgba(0,0,0,.7),transparent 75%);
      z-index:-1;
    }
    nav{
      display:flex;justify-content:space-between;align-items:center;
      padding:20px 0;
      animation:fadeDown .6s cubic-bezier(.16,1,.3,1);
    }
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text-primary)}
    .nav-logo-icon{
      width:36px;height:36px;border-radius:10px;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      display:grid;place-items:center;font-size:12px;font-weight:700;
    }
    .nav-logo-text{font-weight:700;font-size:18px;letter-spacing:-.02em}
    .nav-btn{
      padding:8px 20px;border-radius:100px;font-size:13px;font-weight:600;
      border:1px solid var(--surface-border);background:transparent;
      color:var(--text-secondary);cursor:pointer;transition:all .2s;text-decoration:none;
    }
    .nav-btn:hover{border-color:var(--text-muted);color:var(--text-primary)}

    .hero{
      text-align:center;padding:72px 0 38px;
      animation:fadeUp .8s cubic-bezier(.16,1,.3,1) .1s both;
    }
    .hero-badge{
      display:inline-flex;align-items:center;gap:8px;
      padding:6px 16px;border-radius:100px;
      background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);
      font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
      color:var(--accent-blue);margin-bottom:22px;
    }
    .hero h1{
      font-size:clamp(34px,6.5vw,60px);font-weight:800;line-height:1.1;
      letter-spacing:-.04em;margin-bottom:14px;
      color:var(--text-primary);
    }
    .hero h1 .glow{
      background:linear-gradient(135deg,var(--accent-purple),var(--accent-green));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .hero-sub{
      font-size:16px;color:var(--text-secondary);max-width:640px;margin:0 auto 28px;line-height:1.7;
    }

    .stats{
      display:flex;justify-content:center;gap:48px;margin-bottom:44px;
      animation:fadeUp .8s cubic-bezier(.16,1,.3,1) .25s both;
    }
    .stat{text-align:center}
    .stat-val{font-size:28px;font-weight:800;letter-spacing:-.03em}
    .stat-label{font-size:12px;color:var(--text-muted);margin-top:2px;font-weight:500}

    .section-label{
      font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
      color:var(--text-muted);margin-bottom:18px;
    }

    .sem-grid{
      display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
      margin-bottom:44px;
      animation:fadeUp .8s cubic-bezier(.16,1,.3,1) .35s both;
    }

    .sem-card{
      background:var(--surface);border:1px solid var(--surface-border);
      border-radius:var(--radius);padding:24px;
      text-decoration:none;color:inherit;transition:all .25s;
      position:relative;overflow:hidden;
      display:flex;flex-direction:column;gap:16px;
    }
    .sem-card:hover{
      border-color:#2a2d42;background:var(--surface-hover);
      transform:translateY(-4px);
      box-shadow:0 20px 60px rgba(0,0,0,.4);
    }
    .sem-card-head{display:flex;justify-content:space-between;align-items:flex-start}
    .sem-badge{
      width:40px;height:40px;border-radius:var(--radius-sm);
      display:grid;place-items:center;
      font-size:14px;font-weight:800;color:#fff;
      background:#6366f1;
    }
    .sem-arrow{color:var(--text-muted);font-size:16px;opacity:.5;transition:opacity .2s}
    .sem-card:hover .sem-arrow{opacity:1}
    .sem-info h3{font-size:16px;font-weight:700;letter-spacing:-.01em}
    .sem-info p{font-size:12px;color:var(--text-muted);margin-top:2px}
    .sem-footer{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:8px}
    .sem-count{font-size:13px;color:var(--text-secondary)}
    .sem-count strong{font-weight:700;color:var(--text-primary)}
    .sem-status{padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    .status-available{background:rgba(52,211,153,.12);color:var(--accent-green);border:1px solid rgba(52,211,153,.2)}
    .status-empty{background:rgba(251,191,36,.1);color:var(--accent-amber);border:1px solid rgba(251,191,36,.2)}

    .empty-search{
      border:1px dashed var(--surface-border);
      border-radius:var(--radius);
      padding:28px;
      text-align:center;
      color:var(--text-secondary);
      background:rgba(255,255,255,.01);
      margin-bottom:36px;
    }

    @keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:768px){
      .hero{padding:48px 0 28px}
      .hero h1{font-size:36px}
      .sem-grid{grid-template-columns:1fr}
      .stats{gap:32px}
      .stat-val{font-size:22px}
    }
    @media(min-width:769px) and (max-width:1024px){
      .sem-grid{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="container">
    <nav>
      <a href="../index.html" class="nav-logo">
        <div class="nav-logo-icon">S6</div>
        <span class="nav-logo-text">Semester 6</span>
      </a>
      <a href="../index.html" class="nav-btn">All Semesters</a>
    </nav>

    <section class="hero">
      <div class="hero-badge">SEMESTER RESOURCES</div>
      <h1>Choose a <span class="glow">Subject</span></h1>
      <p class="hero-sub">Semester 6 notes and subject resources.</p>
    </section>

    <div class="stats">
      <div class="stat"><div class="stat-val" id="statOne">0</div><div class="stat-label">Subjects</div></div>
      <div class="stat"><div class="stat-val" id="statTwo">0</div><div class="stat-label">Available Links</div></div>
      <div class="stat"><div class="stat-val" id="statThree">Pending</div><div class="stat-label">Status</div></div>
    </div>

    <section>
      <div class="section-label">AVAILABLE SUBJECTS</div>
      <div id="content"></div>
    </section>
  </div>

  <script src="data.js"></script>
  <script>
    const data = window.SEM_DATA || {};
    const subjects = Array.isArray(data.subjects) ? data.subjects : [];

    const content = document.getElementById('content');
    const statOne = document.getElementById('statOne');
    const statTwo = document.getElementById('statTwo');
    const statThree = document.getElementById('statThree');

    const availableCount = subjects.filter(subject => subject.href).length;
    statOne.textContent = String(subjects.length);
    statTwo.textContent = String(availableCount);
    statThree.textContent = availableCount ? 'Live' : 'Pending';

    if (!subjects.length) {
      content.innerHTML = '<div class="empty-search">No subjects available yet for this semester.</div>';
    } else {
      content.innerHTML = `<div class="sem-grid">${subjects.map((subject, index) => {
        const isAvailable = Boolean(subject.href);
        return `
          <a href="${isAvailable ? subject.href : '#'}" class="sem-card" ${isAvailable ? '' : 'aria-disabled="true" style="pointer-events:none;opacity:.75"'}>
            <div class="sem-card-head">
              <div class="sem-badge">${index + 1}</div>
              <span class="sem-arrow">-></span>
            </div>
            <div class="sem-info">
              <h3>${subject.title}</h3>
              <p>${subject.fullName || 'Subject notes'}</p>
            </div>
            <div class="sem-footer">
              <span class="sem-count"><strong>${isAvailable ? 1 : 0}</strong> Link</span>
              <span class="sem-status ${isAvailable ? 'status-available' : 'status-empty'}">${isAvailable ? 'Available' : 'Empty'}</span>
            </div>
          </a>
        `;
      }).join('')}</div>`;
    }
  </script>
</body>
</html>
